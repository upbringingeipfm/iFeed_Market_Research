<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 · iFeed Market Research</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
 --bone:#FAFAF7; --white:#FFF; --ink:#0D0D0E; --ink-soft:#3A3A3D; --mute:#8E8E93;
 --hair:#E5E5EA; --sage:#7A9B86; --sage-deep:#4A6B56; --sage-tint:#E8EEEA;
 --gold:#B89868; --gold-deep:#8E6F42; --gold-tint:#F3EDE0;
 --f-serif:"Source Serif 4",Georgia,serif;
 --f-ui:"Inter",system-ui,sans-serif;
 --f-mono:"JetBrains Mono",Menlo,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bone);color:var(--ink-soft);font-family:var(--f-ui);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:32px}
.box{max-width:560px;text-align:center;background:var(--white);padding:48px 40px;border:1px solid var(--hair);border-radius:12px;box-shadow:0 2px 12px rgba(13,13,14,0.04)}
.eyebrow{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold-deep);font-weight:600;margin-bottom:18px;font-family:var(--f-mono)}
h1{font-family:var(--f-serif);font-weight:300;font-size:56px;color:var(--ink);letter-spacing:-0.03em;margin:0 0 12px;line-height:1}
h1 em{font-style:italic;color:var(--sage-deep);font-weight:400}
.lede{font-family:var(--f-serif);font-style:italic;font-size:17px;color:var(--ink-soft);margin:0 0 28px;line-height:1.5}
.cta{display:inline-flex;gap:10px;flex-wrap:wrap;justify-content:center}
.cta a{padding:10px 20px;background:var(--sage-deep);color:var(--white);border-radius:6px;font-size:13px;font-weight:500;text-decoration:none;letter-spacing:0.02em}
.cta a:hover{background:var(--ink)}
.cta a.alt{background:var(--white);color:var(--sage-deep);border:1px solid var(--sage-deep)}
.cta a.alt:hover{background:var(--sage-tint)}
.foot{margin-top:32px;font-family:var(--f-mono);font-size:11px;color:var(--mute);letter-spacing:0.04em}
</style>
</head>
<body>
<div class="box">
 <div class="eyebrow">iFeed Market Research</div>
 <h1>4<em>0</em>4</h1>
 <p class="lede">The page you were looking for has moved or doesn't exist yet. Most things you want are one click away.</p>
 <div class="cta">
 <a href="/">Back to home</a>
 <a class="alt" href="/index.html#reports">Browse reports</a>
 <a class="alt" href="/contact.html">Contact us</a>
 </div>
 <div class="foot">iFeedMarketResearch.netlify.app</div>
</div>
</body>
</html>
