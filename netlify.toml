# Netlify build config · iFeed Market Research
# Static HTML site · no build step needed
# Target subdomain: ifeedmarketresearch.netlify.app

[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "20"

# Pretty URLs · strip .html so /about works (not just /about.html)
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/industries"
  to = "/industries.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/methodology"
  to = "/methodology.html"
  status = 200

[[redirects]]
  from = "/consulting"
  to = "/consulting.html"
  status = 200

[[redirects]]
  from = "/custom-research"
  to = "/custom-research.html"
  status = 200

[[redirects]]
  from = "/training"
  to = "/training.html"
  status = 200

[[redirects]]
  from = "/proven-record"
  to = "/proven-record.html"
  status = 200

[[redirects]]
  from = "/horizon"
  to = "/horizon.html"
  status = 200

[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 200

[[redirects]]
  from = "/request-sample"
  to = "/request-sample.html"
  status = 200

[[redirects]]
  from = "/customize"
  to = "/customize.html"
  status = 200

[[redirects]]
  from = "/how-to-order"
  to = "/how-to-order.html"
  status = 200

[[redirects]]
  from = "/speak-to-analyst"
  to = "/speak-to-analyst.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/sitemap"
  to = "/sitemap.html"
  status = 200

# Domain landing pages
[[redirects]]
  from = "/samples/:domain"
  to = "/samples/:domain.html"
  status = 200

# 404 fallback (everything else)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security + performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
